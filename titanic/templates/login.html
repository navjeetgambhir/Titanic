<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Titanic Predictor</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center font-sans">

  <div class="w-full max-w-md px-6">

    <!-- Logo -->
    <div class="text-center mb-8">
      <span class="text-5xl">🚢</span>
      <h1 class="text-2xl font-bold mt-3 tracking-tight">Titanic Predictor</h1>
      <p class="text-sm text-gray-400 mt-1">Sign in to your account</p>
    </div>

    <!-- Card -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8">

      <form hx-post="/ui/login"
            hx-target="#auth-error"
            hx-swap="innerHTML"
            class="space-y-5">

        <div class="flex flex-col gap-1">
          <label class="text-xs text-gray-400 uppercase tracking-wide">Email</label>
          <input type="email" name="email" required placeholder="you@example.com"
                 class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs text-gray-400 uppercase tracking-wide">Password</label>
          <input type="password" name="password" required placeholder="••••••••"
                 class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>

        <!-- Error target -->
        <div id="auth-error"></div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold
                       py-2.5 rounded-lg text-sm transition-colors">
          Sign in
        </button>
      </form>

      <p class="text-center text-sm text-gray-400 mt-6">
        No account?
        <a href="/ui/signup" class="text-blue-400 hover:text-blue-300 font-medium">Create one</a>
      </p>
    </div>

  </div>

</body>
</html>
